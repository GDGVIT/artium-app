name: artium
description: "From Photo to Masterpiece"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  image_picker: ^1.1.2
  carousel_slider: ^5.0.0
  overlapped_carousel: ^1.0.2
  provider: ^6.1.2
  http: ^1.2.2
  flutter_staggered_grid_view: ^0.7.0
  super_tooltip: ^2.0.8
  shimmer: ^3.0.0
  url_launcher: ^6.3.1
  fluttertoast: ^8.2.6
  shared_preferences: ^2.5.2
  flutter_svg: ^2.0.17
  flutter_dotenv: ^5.2.1
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - images/
    - .env

  fonts:
    - family: Outfit
      fonts:
        - asset: fonts/Outfit.ttf
    - family: OutfitBold
      fonts:
        - asset: fonts/OutfitBold.ttf
    - family: OutfitExtraBold
      fonts:
        - asset: fonts/OutfitExtraBold.ttf
    - family: OutfitSemiBold
      fonts:
        - asset: fonts/OutfitSemiBold.ttf
    - family: OutfitMedium
      fonts:
        - asset: fonts/OutfitMedium.ttf
    - family: OutfitBlack
      fonts:
        - asset: fonts/OutfitBlack.ttf
    - family: OutfitExtraLight
      fonts:
        - asset: fonts/Outfit-ExtraLight.ttf
    - family: OutfitLight
      fonts:
        - asset: fonts/Outfit-Light.ttf
    - family: OutfitRegular
      fonts:
        - asset: fonts/OutfitRegular.ttf
